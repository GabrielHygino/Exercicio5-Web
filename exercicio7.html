<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 7</title>
</head>

<body>

    Custo de Fábricação<input name="custoFabrica" id="custoFabrica" /> <br />
    Porcentagem do Distribuidor<input name="percDistribuidor" id="percDistribuidor" /> <br />
    Porcentagem de Impostos<input name="percImpostos" id="percImpostos" /> <br />
    <button onclick="main()" name="btnCalcular">Calcular</button>
    <label id="valorfinal"></label>

    <Script>
        function main() {
            var custoFabrica1 = parseFloat(document.getElementById("custoFabrica").value);
            var percDistribuidor1 = parseFloat(document.getElementById("percDistribuidor").value);
            var percImpostos1 = parseFloat(document.getElementById("percImpostos").value);
            var valorfinal1 = custoFabrica1 + (custoFabrica1 * percDistribuidor1) + (custoFabrica1 * percImpostos1);
            document.getElementById("valorfinal").innerHTML = valorfinal1;
        }
    </Script>
    
</body>

</html>
