<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 05</title>
</head>

<body>
    Numero 1:<input id="num1" type="number"> <br />
    Numero 2:<input id="num2" type="number"> <br />
    <input type="radio" name="calc" id="soma" /> +<br />
    <input type="radio" name="calc" id="subtracao" /> -<br />
    <input type="radio" name="calc" id="multiplicacao" /> *<br />
    <input type="radio" name="calc" id="divisao" /> /<br />
    <button onclick="main()">Calcular</button>
    Resposta: <span id="resp"></span>

    <script>
        function main() {
            var resp = document.getElementById('resp');
            var num1 = parseFloat(document.getElementById("num1").value);
            var num2 = parseFloat(document.getElementById("num2").value);
            var texto = '';

            if (document.getElementById('soma').checked)
                texto = soma(num1, num2);
            if (document.getElementById('subtracao').checked)
                texto = subtracao(num1, num2);
            if (document.getElementById('multiplicacao').checked)
                texto = multiplicacao(num1, num2);
            if (document.getElementById('divisao').checked)
                texto = divisao(num1, num2);

            resp.innerHTML = texto;
        }
        function soma(x, y) {
            return (x + y);
        }
        function subtracao(x, y) {
            return (x - y);
        }
        function multiplicacao(x, y) {
            return (x * y);
        }

        function divisao(x, y) {
            return (x / y);
        }
    </script>
</body>
</html>
